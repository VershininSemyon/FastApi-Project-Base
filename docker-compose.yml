

services:
  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    env_file:
      - .env
    links:
      - "postgres:db"
    networks:
      - app_net
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - app_net

  postgres:
    image: postgres:17-alpine
    container_name: pg_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - app_net
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: adminer
    ports:
      - "8080:8080"
    links:
      - "postgres:db"
    networks:
      - app_net
    depends_on:
      - postgres

  redis:
    image: redis:8.0-alpine
    container_name: redis_database
    networks:
      - app_net
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis_monitoring:
    image: redis/redisinsight:3.0.3
    container_name: redis_monitoring
    restart: always
    ports:
      - "5540:5540"
    environment:
      - REDISINSIGHT_REDIS_URLS=redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - app_net
    depends_on:
      - redis

  celery:
    build:
      context: ./backend
    container_name: celery_worker
    command: celery -A background.celery_app:celery_app worker --loglevel=info
    env_file:
      - .env
    networks:
      - app_net
    depends_on:
      - backend
      - redis

  flower:
    build:
      context: ./backend
    container_name: celery_flower
    command: celery -A background.celery_app:celery_app flower --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file:
      - .env
    networks:
      - app_net
    depends_on:
      - celery
      - redis
  
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - app_net
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: always
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - app_net
    depends_on:
      - prometheus


volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:


networks:
  app_net:
    driver: bridge
